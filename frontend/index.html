<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
    />
    <title>건담 TCG 서포터</title>
    <meta name="description" content="Gundam Card Game deck builder and card browser." />
    <meta name="theme-color" content="#0b0b0b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GCG Deck" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/pwa-icon.png" />
    <script>
      var l = (navigator.languages && navigator.languages[0]) || navigator.language || "";
      document.documentElement.lang = l.startsWith("ko") ? "ko" : "en";
      try {
        var stored = localStorage.getItem("gcg.theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme =
          stored === "light" || stored === "dark" ? stored : prefersDark ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", theme);
        if (theme === "dark") document.documentElement.classList.add("dark");
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
