enum CardKeyword {
  ACTION # 액션
  ACTIVATE_ACTION # 기동 - 액션
  ACTIVATE_MAIN # 기동 - 메인
  ATTACK # 공격시
  BLOCKER # 블로커
  BREACH # 돌파 (유닛 파괴시 실드에 N만큼 데미지)
  BURST # 버스트
  DEPLOY # 배포 시
  DESTROYED # 파괴 시
  DURING_LINK # 링크 중
  DURING_PAIR # 페어 중
  FIRST_STRIKE # 선제공격
  HIGH_MANEUVER # 고기동
  SUPPRESSION
  MAIN # 메인
  ONCE_PER_TURN # 턴에 1회
  END_OF_TURN # 내 턴이 끝날 때
  PILOT # 파일럿
  REPAIR # 리페어
  SUPPORT # 원호
  WHEN_LINKED # 링크시
  WHEN_PAIRED # 페어시
}

enum CardRarity {
  COMMON # C
  UNCOMMON #U
  RARE #R
  LEGENDARY_RARE #LR
  COMMON_PLUS #C+
  UNCOMMON_PLUS #U+
  RARE_PLUS #R+
  LEGENDARY_RARE_PLUS #LR+
  COMMON_PLUS_PLUS #C++
  LEGENDARY_RARE_PLUS_PLUS #LR++
  P #P
}

enum Zone {
  SPACE # 우주
  EARTH # 지구
}

type Deck {
  cards: [Card!]! # 카드뭉치
}

enum CardPackage {
  GD01 # 부스트팩 1
  GD02 # 부스트팩 2
  GD03 # 부스트팩 3
  ST01 # 스타터덱 1
  ST02 # 스타터덱 2
  ST03 # 스타터덱 3
  ST04 # 스타터덱 4
  ST05 # 스타터덱 5
  ST06 # 스타터덱 6
  ST07 # 스타터덱 7
  ST08 # 스타터덱 8
  ST09 # 스타터덱 9
  OTHER_PRODUCT_CARD # 기타 상품 카드
  EDITION_BETA # 베타 에디션
  BASIC_CARDS # 기본 카드
  PROMOTION_CARD # 프로모션 카드
}

union UnitLink = LinkTrait | LinkPilot

type LinkTrait {
  trait: CardTrait!
}

type LinkPilot {
  pilot: Pilot!
}

type PilotCard implements Node {
  id: ID!
  pilot: Pilot!
  level: Int! #레벨
  cost: Int! # 비용
  series: GundamSeries! # 시리즈
  color: CardColor! # 색상
  rarity: CardRarity! #희귀도
  package: CardPackage! # 패키지
  keywords: [CardKeyword!]! #키워드
  description: [String!]! # 효과 정보
}

type Pilot {
  name: String!
  AP: Int! # 공격력
  HP: Int! # 체력
}

type UnitCard implements Node {
  id: ID!
  name: String!
  level: Int! #레벨
  cost: Int! # 비용
  series: GundamSeries! # 시리즈
  color: CardColor! # 색상
  rarity: CardRarity! #희귀도
  package: CardPackage! # 패키지
  keywords: [CardKeyword!]! #키워드
  traits: [CardTrait!]!
  zone: [Zone!]! # 지형
  AP: Int! # 공격력
  HP: Int! # 체력
  links: [UnitLink!]! # 링크 정보
  description: [String!]! # 효과 정보
}

type Resource implements Node {
  id: ID!
  rarity: CardRarity!
  name: String!
}

type BaseCard implements Node {
  id: ID!
  name: String!
  AP: Int!
  HP: Int!
  zone: [Zone!]!
  level: Int!
  cost: Int!
  series: GundamSeries!
  color: CardColor!
  rarity: CardRarity!
  package: CardPackage!
  keywords: [CardKeyword!]!
  description: [String!]!
}

type CommandCard implements Node {
  id: ID!
  name: String!
  level: Int!
  color: CardColor!
  rarity: CardRarity!
  package: CardPackage!
  keywords: [CardKeyword!]!
  cost: Int!
  series: GundamSeries!
  pilot: Pilot
}

union Card = Resource | BaseCard | UnitCard | PilotCard | CommandCard

type CardConnection {
  totalCount: Int!
  edges: [CardEdges!]!
  pageInfo: PageInfo!
}

type CardEdges {
  cursor: String!
  node: Card!
}

enum CardKind {
  RESOURCE
  BASE
  UNIT
  PILOT
  COMMAND
}

input CardFilterInput {
  level: [Int!] #레벨
  cost: [Int!] # 비용
  package: CardPackage # 카드 팩
  rarity: CardRarity # 레어도
  keyword: [CardKeyword!] # 키워드
  trait: [CardTrait!] # 특성
  zone: [Zone!] # 지형
  color: [CardColor!] # 색상
  query: String # 이름/효과정보
  kind: [CardKind!]!
}

enum CardSort {
  NAME_ASC
  NAME_DESC
  COST_ASC
  COST_DESC
  LEVEL_ASC
  LEVEL_DESC
  AP_ASC
  AP_DESC
  HP_ASC
  HP_DESC
}

type Query {
  node(id: ID!): Node
  cards(
    first: Int
    after: String
    filter: CardFilterInput
    sort: CardSort
  ): CardConnection!
  quicksearch(query: String!, first: Int): [Card!]!
}
