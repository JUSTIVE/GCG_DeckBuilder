enum CardKeyword {
  ACTION # 액션
  ACTIVATE_ACTION # 기동 - 액션
  ACTIVATE_MAIN # 기동 - 메인
  ATTACK # 공격시
  BLOCKER # 블로커
  BREACH # 돌파 (유닛 파괴시 실드에 N만큼 데미지)
  BURST # 버스트
  DEPLOY # 배포 시
  DESTROYED # 파괴 시
  DURING_LINK # 링크 중
  DURING_PAIR # 페어 중
  FIRST_STRIKE # 선제공격
  HIGH_MANEUVER # 고기동
  SUPPRESSION
  MAIN # 메인
  ONCE_PER_TURN # 턴에 1회
  END_OF_TURN # 내 턴이 끝날 때
  PILOT # 파일럿
  REPAIR # 리페어
  SUPPORT # 원호
  WHEN_LINKED # 링크시
  WHEN_PAIRED # 페어 시
}

enum CardRarity {
  COMMON # C
  UNCOMMON #U
  RARE #R
  LEGENDARY_RARE #LR
  COMMON_PLUS #C+
  UNCOMMON_PLUS #U+
  RARE_PLUS #R+
  LEGENDARY_RARE_PLUS #LR+
  COMMON_PLUS_PLUS #C++
  LEGENDARY_RARE_PLUS_PLUS #LR++
  P #P
}

enum Zone {
  SPACE # 우주
  EARTH # 지구
}

enum CardPackage {
  GD01 # 부스트팩 1
  GD02 # 부스트팩 2
  GD03 # 부스트팩 3
  ST01 # 스타터덱 1
  ST02 # 스타터덱 2
  ST03 # 스타터덱 3
  ST04 # 스타터덱 4
  ST05 # 스타터덱 5
  ST06 # 스타터덱 6
  ST07 # 스타터덱 7
  ST08 # 스타터덱 8
  ST09 # 스타터덱 9
  OTHER_PRODUCT_CARD # 기타 상품 카드
  EDITION_BETA # 베타 에디션
  BASIC_CARDS # 기본 카드
  PROMOTION_CARD # 프로모션 카드
}

type Trait implements Node {
  id: ID!
  value: CardTrait!
  cards: [PlayableCard!]!
}

type Keyword implements Node {
  id: ID!
  value: CardKeyword!
  cards: [PlayableCard!]!
}

type Color implements Node {
  id: ID!
  value: CardColor!
  cards: [PlayableCard!]!
}

type Series implements Node {
  id: ID!
  value: GundamSeries!
  cards: [PlayableCard!]!
}

union CardGrouping = Trait | Keyword | Color | Series

union UnitLink = LinkTrait | LinkPilot

type LinkTrait {
  trait: CardTrait!
}

type LinkPilot {
  pilot: Pilot!
}

type PilotCard implements Node {
  id: ID!
  pilot: Pilot!
  level: Int! #레벨
  cost: Int! # 비용
  series: Series! # 시리즈
  color: Color! # 색상
  rarity: CardRarity! #희귀도
  package: CardPackage! # 패키지
  keywords: [Keyword!]! #키워드
  traits: [Trait!]!
  relatedTraits: [Trait!]!
  # 이 파일럿을 링크 가능한 유닛 카드 목록 (역방향)
  linkableUnits: [UnitCard!]!
  description: [DescriptionLine!]! # 효과 정보
  limit: Int! # 덱에 넣을 수 있는 최대 장 수
  blocked: Boolean! # limit이 0인 카드 (금지 카드)
  imageUrl: String!
}

type LocalizedString {
  en: String!
  ko: String!
}

type Pilot {
  name: LocalizedString!
  AP: Int! # 공격력
  HP: Int! # 체력
}

type UnitCard implements Node {
  id: ID!
  name: LocalizedString!
  level: Int! #레벨
  cost: Int! # 비용
  series: Series! # 시리즈
  color: Color! # 색상
  rarity: CardRarity! #희귀도
  package: CardPackage! # 패키지
  keywords: [Keyword!]! #키워드
  traits: [Trait!]!
  relatedTraits: [Trait!]!
  zone: [Zone!]! # 지형
  AP: Int! # 공격력
  HP: Int! # 체력
  links: [UnitLink!]! # 링크 정보
  # 이 유닛이 링크할 수 있는 파일럿 카드 목록 (LinkPilot 이름 매칭)
  linkablePilots: [PilotCard!]!
  description: [DescriptionLine!]! # 효과 정보
  limit: Int! # 덱에 넣을 수 있는 최대 장 수
  blocked: Boolean! # limit이 0인 카드 (금지 카드)
  imageUrl: String!
}

type Resource implements Node {
  id: ID!
  rarity: CardRarity!
  name: LocalizedString!
}

type BaseCard implements Node {
  id: ID!
  name: LocalizedString!
  AP: Int!
  HP: Int!
  zone: [Zone!]!
  traits: [Trait!]!
  relatedTraits: [Trait!]!
  level: Int!
  cost: Int!
  series: Series!
  color: Color!
  rarity: CardRarity!
  package: CardPackage!
  keywords: [Keyword!]!
  description: [DescriptionLine!]!
  limit: Int! # 덱에 넣을 수 있는 최대 장 수
  blocked: Boolean! # limit이 0인 카드 (금지 카드)
  imageUrl: String!
}

type CommandCard implements Node {
  id: ID!
  name: LocalizedString!
  level: Int!
  color: Color!
  rarity: CardRarity!
  package: CardPackage!
  keywords: [Keyword!]!
  traits: [Trait!]!
  relatedTraits: [Trait!]!
  cost: Int!
  series: Series!
  pilot: Pilot
  description: [DescriptionLine!]!
  limit: Int! # 덱에 넣을 수 있는 최대 장 수
  blocked: Boolean! # limit이 0인 카드 (금지 카드)
  imageUrl: String!
}

union Card = Resource | BaseCard | UnitCard | PilotCard | CommandCard
union PlayableCard = BaseCard | UnitCard | PilotCard | CommandCard

type CardConnection {
  totalCount: Int!
  edges: [CardEdges!]!
  pageInfo: PageInfo!
}

type CardEdges {
  cursor: String!
  node: Card!
}

enum CardKind {
  RESOURCE
  BASE
  UNIT
  PILOT
  COMMAND
}

input CardFilterInput {
  level: [Int!] #레벨
  cost: [Int!] # 비용
  package: CardPackage # 카드 팩
  rarity: CardRarity # 레어도
  keyword: [CardKeyword!] # 키워드
  trait: [CardTrait!] # 특성
  zone: [Zone!] # 지형
  color: [CardColor!] # 색상
  query: String # 이름/효과정보
  kind: [CardKind!]!
  series: [GundamSeries!] # 시리즈
}

enum CardSort {
  NAME_ASC
  NAME_DESC
  COST_ASC
  COST_DESC
  LEVEL_ASC
  LEVEL_DESC
  AP_ASC
  AP_DESC
  HP_ASC
  HP_DESC
}

type SearchHistoryFilter {
  kind: [CardKind!]!
  level: [Int!]
  cost: [Int!]
  package: CardPackage
  rarity: CardRarity
  keyword: [CardKeyword!]
  trait: [CardTrait!]
  zone: [Zone!]
  color: [CardColor!]
  query: String
  sort: CardSort
}

type FilterSearchHistory implements Node {
  id: ID!
  filter: SearchHistoryFilter!
  searchedAt: String!
}

type CardViewHistory implements Node {
  id: ID!
  card: Card!
  searchedAt: String!
}

union SearchHistory = FilterSearchHistory | CardViewHistory

type SearchHistoryList implements Node {
  id: ID!
  items: [SearchHistory!]!
}

type UnitDeckCard {
  card: UnitCard!
  count: Int!
  # true if the unit has no LinkPilot requirement, or at least one required
  # pilot (by name, with aliases and parenthetical variants handled) is in the deck.
  pilotLinked: Boolean!
}

type PilotDeckCard {
  card: PilotCard!
  count: Int!
  # true if at least one unit in the deck links to this pilot.
  hasLinkingUnit: Boolean!
}

type BaseDeckCard {
  card: BaseCard!
  count: Int!
}

type CommandDeckCard {
  card: CommandCard!
  count: Int!
}

type ResourceDeckCard {
  card: Resource!
  count: Int!
}

union DeckCard = UnitDeckCard | PilotDeckCard | BaseDeckCard | CommandDeckCard | ResourceDeckCard

type Deck implements Node {
  id: ID!
  name: String!
  cards: [DeckCard!]!
  createdAt: String!
  colors: [CardColor!]!
  topKeywords(limit: Int): [CardKeyword!]!
  topTraits(limit: Int): [CardTrait!]!
  hasLinkWarning: Boolean!
}

type DeckList implements Node {
  id: ID!
  decks: [Deck!]!
}

# ─── addCardToDeck result union ───────────────────────────────────────────────

type AddCardToDeckSuccess {
  deck: Deck!
}

type DeckNotFoundError {
  deckId: ID!
}

type CardBannedError {
  cardId: ID!
}

type CardCopyLimitExceededError {
  cardId: ID!
  limit: Int!
  current: Int!
}

type DeckFullError {
  current: Int!
  max: Int!
}

type DeckColorLimitExceededError {
  currentColors: [CardColor!]!
  max: Int!
}

union AddCardToDeckResult =
  | AddCardToDeckSuccess
  | DeckNotFoundError
  | CardBannedError
  | CardCopyLimitExceededError
  | DeckFullError
  | DeckColorLimitExceededError

type Query {
  node(id: ID!): Node
  cards(first: Int, after: String, filter: CardFilterInput, sort: CardSort): CardConnection!
  quicksearch(query: String!, first: Int): [Card!]!
  searchHistory: SearchHistoryList!
  deckList: DeckList!
  randomCard(kind: CardKind!): Card
  randomCards(kind: CardKind!, count: Int!): [Card!]!
  trait(value: CardTrait!): Trait
  keyword(value: CardKeyword!): Keyword
  color(value: CardColor!): Color
  series(value: GundamSeries!): Series
}

input DeckCardInput {
  cardId: ID!
  count: Int!
}

type Mutation {
  addFilterSearch(filter: CardFilterInput!, sort: CardSort): SearchHistoryList!
  addCardView(cardId: ID!): SearchHistoryList!
  removeSearchHistory(id: ID!): Boolean!
  clearSearchHistory: Boolean!
  createDeck(name: String!): DeckList!
  deleteDeck(id: ID!): DeckList!
  renameDeck(id: ID!, name: String!): Deck!
  addCardToDeck(deckId: ID!, cardId: ID!): AddCardToDeckResult!
  removeCardFromDeck(deckId: ID!, cardId: ID!): Deck!
  setDeckCards(deckId: ID!, cards: [DeckCardInput!]!): Deck!
}
