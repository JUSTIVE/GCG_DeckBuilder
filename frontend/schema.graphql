type TriggerToken {
  type: String!
  keyword: CardKeyword!
  qualifier: LocalizedString
}

type AbilityToken {
  type: String!
  keyword: CardKeyword!
  n: Int
}

type ProseToken {
  type: String!
  text: LocalizedString!
}

union DescriptionToken = TriggerToken | AbilityToken | ProseToken

type DescriptionLine {
  tokens: [DescriptionToken!]!
}

interface Node {
  id: ID!
}

type PageInfo {
  hasPreviousPage: Boolean!
  hasNextPage: Boolean!
  startCursor: String
  endCursor: String
}

